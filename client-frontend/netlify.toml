# Netlify build settings for the public-facing site (acces-spre-succes.ro).
#
# When creating the site in Netlify, set the *base directory* to `client-frontend`.
# Netlify then reads this file from inside that base, so all paths below are
# relative to `client-frontend/`.

[build]
  command = "npm install && npm run build"
  publish = "build"

# Set VITE_API_BASE_URL in the Netlify UI (Site settings -> Environment variables)
# to the public backend origin, e.g. https://api.acces-spre-succes.ro
# It is read at build time by src/config.js.

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: the same rule lives in public/_redirects, kept here as a backup
# in case the file is missed.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache hashed Vite assets aggressively.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
