# Application Name
spring.application.name=Site_ONG

# Server Configuration
server.port=${SERVER_PORT:8080}

# Stripe Configuration
# Read from STRIPE_SECRET_KEY env var (set via .env / docker-compose).
# Empty default lets the app boot without payments configured.
# TODO: replace with EuPlatesc integration.
stripe.secret.key=${STRIPE_SECRET_KEY:}

# Database Configuration
# All values come from environment variables (see .env / .env.example).
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# File Upload Configuration
file.upload-dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
