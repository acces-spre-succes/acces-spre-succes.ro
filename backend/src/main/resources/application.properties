# Application Name
spring.application.name=Site_ONG

# Server Configuration
server.port=${SERVER_PORT:8080}

# Stripe Configuration
# Read from STRIPE_SECRET_KEY env var (set via .env / docker-compose).
# Empty default lets the app boot without payments configured.
# TODO: replace with EuPlatesc integration.
stripe.secret.key=${STRIPE_SECRET_KEY:}

# Auth (JWT + admin bootstrap)
# JWT_SECRET must be at least 32 characters (HS256 needs 256 bits of key material).
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Comma-separated list of origins allowed to call /api/**.
# Production: include https://acces-spre-succes.ro and https://admin.acces-spre-succes.ro.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# Bootstrap a single admin on first startup. Once one exists these are ignored.
app.admin.bootstrap-username=${ADMIN_BOOTSTRAP_USERNAME:}
app.admin.bootstrap-password=${ADMIN_BOOTSTRAP_PASSWORD:}

# Database Configuration
# All values come from environment variables (see .env / .env.example).
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# File Upload Configuration
file.upload-dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
